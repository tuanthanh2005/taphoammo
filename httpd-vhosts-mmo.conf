# Virtual Host cho MMO Marketplace
# Copy nội dung này vào file httpd-vhosts.conf của Apache

<VirtualHost *:80>
    ServerName mmo.local
    DocumentRoot "D:/aicuatoi/public"
    
    <Directory "D:/aicuatoi/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog "logs/mmo-error.log"
    CustomLog "logs/mmo-access.log" common
</VirtualHost>
